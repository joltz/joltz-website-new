<!--
  API_BASE_URL is only set when the static site and the booking API are on
  different origins (e.g. this site on AWS Amplify Hosting, the API on a
  separate EC2 host). Empty string means same-origin relative paths, which
  is the default local/dev/EC2-only setup. See build.js / API_BASE_URL.
-->
<script>
  window.JOLT_API_BASE = "{{API_BASE_URL}}";
  window.apiUrl = function (path) { return (window.JOLT_API_BASE || "") + path; };
</script>
